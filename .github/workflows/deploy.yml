name: Flexible AWS EKS Infrastructure Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Select the pipeline action'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

jobs:
  # FIX: Pre-destruction step to wipe out the load balancer dependency
  clean-kubernetes-resources:
    name: "Pre-Destroy K8s Resources"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'destroy' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name poc-eks-cluster-v2 --region us-east-1

      # This completely deletes the Nginx Load Balancer from your AWS account
      - name: Delete Load Balancer Service
        run: |
          kubectl delete service nginx-service --ignore-not-found=true
          sleep 60

  terraform:
    name: "Terraform Execution"
    needs: clean-kubernetes-resources
    # This allows it to run immediately if doing an 'apply', or wait for cleanup if 'destroy'
    if: always() 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Run
        run: terraform ${{ github.event.inputs.action }} -auto-approve -input=false

  deploy-app:
    name: "Deploy Application"
    needs: terraform
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'apply' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name poc-eks-cluster-v2 --region us-east-1

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s-deployment.yaml
          kubectl rollout status deployment/sample-nginx
