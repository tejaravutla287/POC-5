name: Flexible AWS EKS Infrastructure Pipeline

on:
  # Enables manual execution via the GitHub UI with dropdown options
  workflow_dispatch:
    inputs:
      action:
        description: 'Select the pipeline action'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    name: "Terraform Execution"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      # Dynamically runs apply or destroy based on your UI dropdown selection
      - name: Terraform Run
        run: terraform ${{ github.event.inputs.action }} -auto-approve -input=false

  deploy-app:
    name: "Deploy Application"
    needs: terraform
    runs-on: ubuntu-latest
    # This step only runs if you selected 'apply'. It skips automatically during a destroy run.
    if: ${{ github.event.inputs.action == 'apply' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name poc-eks-cluster-v2 --region us-east-1

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s-deployment.yaml
          kubectl rollout status deployment/sample-nginx
